spring:
  application:
    name: reservation-service
  datasource:
    username: username
    password:
    url: jdbc:h2:mem:reservation-db
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2

server:
  port: 8080
  servlet:
    contextPath: /v1/reservation-management

http-clients:
  inventory-client:
    base-url: http://localhost:8081/v1/inventory-management