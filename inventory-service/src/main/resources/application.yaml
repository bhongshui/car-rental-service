spring:
  application:
    name: inventory-service
  datasource:
    username: username
    password:
    url: jdbc:h2:mem:inventory-db
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: none
  h2:
    console:
      enabled: true
      path: /h2

server:
  port: 8081
  servlet:
    contextPath: /v1/inventory-management